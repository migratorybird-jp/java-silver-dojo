// 本番80問シミュレーション用に全問をフラット化
function buildExam80() {
  const all = [];
  Object.entries(QUESTION_BANK).forEach(([chId, qs]) => {
    qs.forEach((q,i) => all.push({ chId, idx: i, ...q }));
  });
  // shuffle
  for(let i=all.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [all[i],all[j]]=[all[j],all[i]];
  }
  return all.slice(0, Math.min(80, all.length));
}

      React.createElement('div', { style:{ ...card, background:"rgba(59,130,246,0.07)", border:`1px solid rgba(59,130,246,0.25)`, marginBottom:24 } },
        React.createElement('div', { style:{ display:"flex", flexWrap:"wrap", gap:20, justifyContent:"center" } },
          [["📋","試験番号","1Z0-815-JPN"],["❓","出題数","80問"],["⏱️","制限時間","180分"],["✅","合格ライン","63% (約50問正解)"],["💰","受験料","32,340円"]].map(([icon,label,val],i) =>
            React.createElement('div', { key:i, style:{ textAlign:"center" } },
              React.createElement('div', { style:{ fontSize:20 } }, icon),
              React.createElement('div', { style:{ fontSize:11, color:C.muted, marginTop:2 } }, label),
              React.createElement('div', { style:{ fontWeight:700, color:"#60a5fa", fontSize:14 } }, val)
            )
          )
        )
      ),

      // 本番模擬ボタン
      React.createElement('div', { style:{ textAlign:"center", marginBottom:28 } },
        React.createElement('button', { onClick:startExam, style:{ ...btn("green"), fontSize:17, padding:"14px 40px", borderRadius:12, letterSpacing:0.5 } }, "🎯 本番模擬試験（80問）を開始する"),
        React.createElement('div', { style:{ marginTop:8, color:C.muted, fontSize:13 } }, "制限時間180分・タイマー付き・採点&解説あり")
      ),

      // 章一覧
      React.createElement('h2', { style:{ fontSize:15, color:C.sub, marginBottom:14, fontWeight:500 } }, "章別練習（問題バンクから重点学習）"),
      React.createElement('div', { style:{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))", gap:12 } },
        CHAPTERS.map(ch => {
          const prog = progress[ch.id]||0;
          const qCount = (QUESTION_BANK[ch.id]||[]).length;
          return React.createElement('div', {
            key:ch.id,
            onClick: ()=>openChapter(ch.id),
            style:{ background:C.panel, border:`1px solid ${C.border}`, borderRadius:13, padding:17, cursor:"pointer", transition:"all 0.18s" }
          },
            React.createElement('div', { style:{ display:"flex", justifyContent:"space-between", marginBottom:8 } },
              React.createElement('span', { style:{ fontSize:22 } }, ch.icon),
              prog>0 && React.createElement('span', { style:{ fontSize:12, fontWeight:700, padding:"2px 10px", borderRadius:20, background:prog>=80?"rgba(16,185,129,0.2)":"rgba(59,130,246,0.15)", color:prog>=80?C.green:"#60a5fa" } }, `${prog}%`)
            ),
            React.createElement('div', { style:{ fontWeight:600, fontSize:13, marginBottom:4 } }, ch.label),
            React.createElement('div', { style:{ fontSize:12, color:C.muted } }, `${qCount}問収録 / 試験比重 ${ch.weight}%`),
            prog>0 && React.createElement('div', { style:{ marginTop:9, height:3, background:"rgba(255,255,255,0.05)", borderRadius:2 } },
              React.createElement('div', { style:{ height:"100%", width:`${prog}%`, background:`linear-gradient(90deg,${C.blue},${C.purple})`, borderRadius:2 } })
            )
          );
        })
      )
    )
  );

  // CHAPTER PAGE
  if(page==="chapter") {
    const ch = CHAPTERS.find(c=>c.id===selectedCh);
    return React.createElement('div', { style:{ minHeight:"100vh", background:C.bg, fontFamily:"'Noto Sans JP',sans-serif", color:C.text } },
      React.createElement('div', { style:header },
        React.createElement('button', { onClick:()=>setPage("home"), style:btn("secondary") }, "← 戻る"),
        React.createElement('div', { style:{ fontWeight:700, fontSize:15 } }, ch?.label||""),
        React.createElement('span', { style:{ fontSize:13, color:C.muted } }, `${chQIdx+1} / ${chQs.length}`)
      ),
      React.createElement('div', { style:main },
        !chDone ? React.createElement('div', null,
          React.createElement('div', { style:card },
            React.createElement('div', { style:{ display:"flex", gap:3, marginBottom:16 } },
              chQs.map((_,i)=>React.createElement('div',{key:i,style:{flex:1,height:4,borderRadius:2,background:i<chResults.length?(chResults[i]?C.green:C.red):i===chQIdx?C.blue:"rgba(255,255,255,0.08)"}}))
            ),
            renderQ(curChQ, chSel, setChSel, showExp),
            !showExp ? React.createElement('div', { style:{ marginTop:16 } },
              React.createElement('button', { onClick:submitChAnswer, disabled:chSel.length===0, style:{ ...btn(chSel.length>0?"primary":"secondary"), opacity:chSel.length>0?1:0.5 } }, "回答する")
            ) : (
              chQIdx+1 < chQs.length && React.createElement('button', { onClick:nextChQ, style:{ ...btn("primary"), marginTop:14 } }, "次の問題 →")
            )
          )
        ) : React.createElement('div', { style:{ ...card, textAlign:"center", padding:40 } },
          React.createElement('div', { style:{ fontSize:48, marginBottom:12 } }, chResults.filter(Boolean).length===chQs.length?"🏆":chResults.filter(Boolean).length>=chQs.length*0.7?"👍":"📚"),
          React.createElement('h2', { style:{ fontSize:22, margin:"0 0 6px" } }, `${chResults.filter(Boolean).length} / ${chQs.length} 正解`),
          React.createElement('div', { style:{ color:C.muted, marginBottom:20, fontSize:14 } }, `正答率 ${Math.round(chResults.filter(Boolean).length/chQs.length*100)}%`),
          React.createElement('div', { style:{ display:"flex", gap:10, justifyContent:"center" } },
            React.createElement('button', { onClick:()=>openChapter(selectedCh), style:btn("secondary") }, "もう一度"),
            React.createElement('button', { onClick:()=>setPage("home"), style:btn("primary") }, "トップへ戻る")
          )
        )
      )
    );
  }

  // EXAM PAGE
  if(page==="exam") {
    if(examReview) {
      const rq = examQs[reviewIdx];
      const rSel = examAnswers[reviewIdx]||[];
      const isCorrect = JSON.stringify([...rSel].sort())===JSON.stringify([...rq.ans].sort());
      return React.createElement('div', { style:{ minHeight:"100vh", background:C.bg, fontFamily:"'Noto Sans JP',sans-serif", color:C.text } },
        React.createElement('div', { style:header },
          React.createElement('button', { onClick:()=>setExamReview(false), style:btn("secondary") }, "← 結果へ"),
          React.createElement('span', { style:{ fontWeight:700 } }, `問題 ${reviewIdx+1} / ${examQs.length}`),
          React.createElement('span', { style:{ fontSize:13, padding:"3px 12px", borderRadius:20, background:isCorrect?"rgba(16,185,129,0.15)":"rgba(239,68,68,0.15)", color:isCorrect?C.green:C.red } }, isCorrect?"✓ 正解":"✗ 不正解")
        ),
        React.createElement('div', { style:main },
          React.createElement('div', { style:{ marginBottom:10, fontSize:12, color:C.muted } }, `章: ${CHAPTERS.find(c=>c.id===rq.chId)?.label}`),
          React.createElement('div', { style:card }, renderQ(rq, rSel, ()=>{}, true)),
          React.createElement('div', { style:{ display:"flex", gap:10, justifyContent:"center" } },
            reviewIdx>0 && React.createElement('button', { onClick:()=>setReviewIdx(i=>i-1), style:btn("secondary") }, "← 前"),
            reviewIdx<examQs.length-1 && React.createElement('button', { onClick:()=>setReviewIdx(i=>i+1), style:btn("primary") }, "次 →")
          )
        )
      );
    }

    if(examDone) {
      const sc = examScore();
      const pct = Math.round(sc/examQs.length*100);
      const passed = pct >= 63;
      // 章別スコア
      const chScore = {};
      CHAPTERS.forEach(ch=>{ chScore[ch.id]={correct:0,total:0}; });
      examQs.forEach((q,i)=>{ if(q.chId){ chScore[q.chId].total++; if(JSON.stringify([...(examAnswers[i]||[])].sort())===JSON.stringify([...q.ans].sort())) chScore[q.chId].correct++; } });
      return React.createElement('div', { style:{ minHeight:"100vh", background:C.bg, fontFamily:"'Noto Sans JP',sans-serif", color:C.text } },
        React.createElement('div', { style:header },
          React.createElement('span', { style:{ fontWeight:700, fontSize:16 } }, "模擬試験 結果"),
          React.createElement('button', { onClick:()=>setPage("home"), style:btn("secondary") }, "トップへ")
        ),
        React.createElement('div', { style:main },
          React.createElement('div', { style:{ ...card, textAlign:"center", padding:36, background:passed?"rgba(16,185,129,0.07)":"rgba(239,68,68,0.07)", border:`1px solid ${passed?C.green:C.red}` } },
            React.createElement('div', { style:{ fontSize:52, marginBottom:10 } }, passed?"🎉":"💪"),
            React.createElement('div', { style:{ fontSize:28, fontWeight:700, color:passed?C.green:C.red } }, passed?"合格ライン達成！":"不合格"),
            React.createElement('div', { style:{ fontSize:36, fontWeight:700, margin:"12px 0", color:C.text } }, `${sc} / ${examQs.length} 問`),
            React.createElement('div', { style:{ fontSize:18, color:passed?C.green:C.red, fontWeight:600 } }, `${pct}%（合格ライン: 63%）`),
          ),
          React.createElement('h3', { style:{ margin:"20px 0 12px", fontSize:15, color:C.sub } }, "章別スコア"),
          React.createElement('div', { style:{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))", gap:8 } },
            CHAPTERS.map(ch => {
              const s = chScore[ch.id];
              if(!s||s.total===0) return null;
              const p2 = Math.round(s.correct/s.total*100);
              return React.createElement('div', { key:ch.id, style:{ ...card, padding:14, marginBottom:0 } },
                React.createElement('div', { style:{ fontSize:12, color:C.sub, marginBottom:4 } }, ch.label),
                React.createElement('div', { style:{ fontWeight:700, color:p2>=70?C.green:p2>=50?C.yellow:C.red } }, `${s.correct}/${s.total} (${p2}%)`),
                React.createElement('div', { style:{ marginTop:5, height:3, background:"rgba(255,255,255,0.05)", borderRadius:2 } },
                  React.createElement('div', { style:{ height:"100%", width:`${p2}%`, background:p2>=70?`linear-gradient(90deg,${C.green},#059669)`:p2>=50?`linear-gradient(90deg,${C.yellow},#b45309)`:`linear-gradient(90deg,${C.red},#991b1b)`, borderRadius:2 } })
                )
              );
            })
          ),
          React.createElement('div', { style:{ textAlign:"center", marginTop:20 } },
            React.createElement('button', { onClick:()=>{ setExamReview(true); setReviewIdx(0); }, style:{ ...btn("secondary"), marginRight:10 } }, "📝 全問解説を見る"),
            React.createElement('button', { onClick:startExam, style:btn("primary") }, "もう一度受験する")
          )
        )
      );
    }

    // 試験中
    const answered = Object.keys(examAnswers).length;
    return React.createElement('div', { style:{ minHeight:"100vh", background:C.bg, fontFamily:"'Noto Sans JP',sans-serif", color:C.text } },
      React.createElement('div', { style:header },
        React.createElement('div', { style:{ display:"flex", alignItems:"center", gap:12 } },
          React.createElement('span', { style:{ fontWeight:700, fontSize:15 } }, `問 ${examIdx+1} / ${examQs.length}`),
          React.createElement('span', { style:{ fontSize:12, color:C.muted } }, `回答済: ${answered}問`),
        ),
        React.createElement('div', { style:{ display:"flex", alignItems:"center", gap:10 } },
          React.createElement('span', { style:{ fontFamily:"monospace", fontSize:18, fontWeight:700, color:examTime<600?C.red:examTime<1800?C.yellow:"#60a5fa" } }, fmt(examTime)),
          React.createElement('button', { onClick:()=>{ clearInterval(timerRef.current); setExamDone(true); }, style:{ ...btn("red"), fontSize:12, padding:"6px 14px" } }, "終了・採点")
        )
      ),
      React.createElement('div', { style:main },
        // 進捗バー
        React.createElement('div', { style:{ display:"flex", gap:1.5, marginBottom:16, flexWrap:"wrap" } },
          examQs.map((_,i)=>React.createElement('div',{key:i,style:{width:8,height:8,borderRadius:2,background:examAnswers[i]!==undefined?(JSON.stringify([...(examAnswers[i]||[])].sort())===JSON.stringify([...(examQs[i]?.ans||[])].sort())?"#10b981":"#6b7280"):i===examIdx?C.blue:"rgba(255,255,255,0.06)"}}))
        ),
        examQ && React.createElement('div', null,
          React.createElement('div', { style:{ marginBottom:8, fontSize:12, color:C.muted } },
            `章: ${CHAPTERS.find(c=>c.id===examQ.chId)?.label}`
          ),
          React.createElement('div', { style:card },
            renderQ(examQ, examSel, setExamSel, false)
          ),
          React.createElement('div', { style:{ display:"flex", gap:10, alignItems:"center" } },
            React.createElement('button', {
              onClick:submitExamAnswer,
              disabled:examSel.length===0,
              style:{ ...btn(examSel.length>0?"primary":"secondary"), opacity:examSel.length>0?1:0.5 }
            }, examIdx+1>=examQs.length?"回答して採点 →":"回答して次へ →"),
            examIdx>0 && React.createElement('button', { onClick:()=>{ setExamIdx(i=>i-1); setExamSel(examAnswers[examIdx-1]||[]); }, style:btn("secondary") }, "← 前の問題")
          )
        )
      )
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
